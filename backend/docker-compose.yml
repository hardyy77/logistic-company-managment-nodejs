services:
  postgres:
    image: postgres:16
    container_name: local-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - logistic_postgres_data:/var/lib/postgresql/data
      - ./db/init_full.sql:/docker-entrypoint-initdb.d/01-init_full.sql:ro

volumes:
  logistic_postgres_data:
    name: logistic_postgres_data
